<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpeechPT , Notes</title>
  <link rel="stylesheet" href="./css/common.css?v=20260513-2" />
  <link rel="stylesheet" href="./css/note.css?v=20260513-2" />
  <style>
    .logo-img { cursor: pointer; }
  </style>
</head>
<body>
  <div class="note-page">
    <header class="top-bar">
      <img src="./assets/logo.png" alt="SpeechPT" class="logo-img" />

      <nav class="top-menu">
        <a href="#" id="loginMenuLink" class="is-hidden">로그인</a>
        <button id="logoutButton" class="is-hidden">로그아웃</button>
      </nav>
    </header>

    <section class="notice-bar">
      <p>ver 0.0.1 테스트중</p>
    </section>

    <section class="workspace-shell" id="memberWorkspaceSection">
      <section class="view-toggle">
        <button type="button">격자</button>
        <button type="button">리스트</button>
      </section>

      <main class="note-grid" id="noteGrid">
        <div class="note-card add-card" id="createNoteCard">
          <div class="plus-icon">+</div>
          <div class="note-label">새 노트 추가</div>
        </div>
      </main>
    </section>
  </div>

  <!-- 노트 생성 모달 -->
  <div class="modal-backdrop" id="createNoteModalBackdrop">
    <div class="modal-content create-note-modal">
      <button class="modal-close-button" id="closeCreateNoteModalButton">×</button>
      <h1>새 노트 만들기</h1>
      <p>제목을 입력하고 확인을 눌러주세요. 설명은 선택 사항입니다.</p>
      <input type="text" id="createNoteTitleInput" placeholder="새 노트 제목을 입력하세요." />
      <textarea id="createNoteDescriptionInput" placeholder="노트 설명을 입력하세요. (선택)" rows="4"></textarea>
      <div class="modal-actions">
        <button type="button" id="cancelCreateNoteButton">취소</button>
        <button type="button" id="confirmCreateNoteButton">확인</button>
      </div>
    </div>
  </div>

  <!-- 로그아웃 확인 모달 -->
  <div class="modal-backdrop" id="logoutConfirmModalBackdrop">
    <div class="modal-content logout-confirm-modal">
      <h1>로그아웃 확인</h1>
      <p>정말 로그아웃 하시겠습니까?</p>
      <div class="modal-actions">
        <button type="button" id="cancelLogoutButton">취소</button>
        <button type="button" id="confirmLogoutButton">로그아웃</button>
      </div>
    </div>
  </div>

  <script type="module" src="./js/note.js"></script>
</body>
</html>
